version: '3.8'

services:
  backend:
    build: ./backend
    container_name: videosieve-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=sqlite+aiosqlite:///./data/db/videosieve.db
      - WHISPER_MODEL=base
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - MAX_CONCURRENT_TASKS=5
      - AUDIO_OUTPUT_DIR=./data/audio
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    restart: unless-stopped
    networks:
      - videosieve-network

  frontend:
    build: ./frontend
    container_name: videosieve-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - videosieve-network

networks:
  videosieve-network:
    driver: bridge

volumes:
  data:

